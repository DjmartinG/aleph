# app_streamlit es la APLICACIÓN (capa de presentación), no un paquete distribuible.
# El motor financiero vive como paquete aparte en `../engine` (aleph_engine) y se instala
# (`pip install -e ../engine`); la app lo consume vía import. Aquí solo queda la config de
# pruebas y lint. (PROMPT 3 · bloque 2: se retiró el empaquetado de cg_engine, ya eliminado.)

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]            # importa app.py / ui / charts desde la raíz de app_streamlit
addopts = "-q"

[tool.ruff]
target-version = "py312"
line-length = 120

[tool.ruff.lint]
# Solo reglas de CORRECTITUD (errores reales), no estilo (igual que el engine y el CI).
select = ["E9", "F63", "F7", "F82"]
