name: CI

# Red de seguridad del monorepo ALEPH. Corre en cada push/PR a main:
#   instalar motor (aleph_engine) -> lint -> tests del motor (incl. harness dorado) -> tests de la API.
# Las anclas AUDITADAS y los snapshots REALES usan datos confidenciales (gitignored): en CI solo corren
# los ILUSTRATIVOS (en el repo). (Streamlit retirado jun-2026: ya no hay paso de app_streamlit.)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: engine/pyproject.toml

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -e ./engine          # aleph_engine (el motor) + sus deps (pydantic, scipy, dateutil)
          pip install fastapi httpx "uvicorn[standard]" "pyjwt[crypto]"   # deps de la API (4a + auth 4c)
          pip install pytest ruff

      - name: Lint (ruff — solo errores de correctitud)
        run: |
          ruff check engine
          ruff check api

      - name: Tests del motor (aleph_engine — incl. harness dorado + anclas)
        working-directory: engine
        run: pytest

      - name: Tests de la API (contrato dorado + fidelidad al motor)
        working-directory: api
        run: pytest
