name: CI

# Red de seguridad del monorepo ALEPH. Corre en cada push/PR a main:
#   instalar motor (aleph_engine) -> lint de correctitud -> compilación -> tests del motor
#   (incl. harness dorado) -> tests de la app (regresión de cifras + humo de UI).
# Los tests de anclas AUDITADAS usan JSON reales (confidenciales/gitignored): en CI solo corren los
# de REGRESIÓN (proyectos ilustrativos) y, del harness dorado, los 3 snapshots ilustrativos.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: app_streamlit/requirements.txt

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r app_streamlit/requirements.txt
          pip install -e ./engine          # aleph_engine (el motor) como paquete instalado
          pip install pytest ruff

      - name: Lint (ruff — solo errores de correctitud)
        run: |
          ruff check engine
          ruff check app_streamlit

      - name: Compilar (atrapa errores de sintaxis antes de desplegar)
        working-directory: app_streamlit
        run: python -m compileall -q app.py charts.py storage.py navarra_data.py ui

      - name: Tests del motor (aleph_engine — incl. harness dorado)
        working-directory: engine
        run: pytest

      - name: Tests de la app (regresión de cifras + humo de UI)
        working-directory: app_streamlit
        run: pytest
